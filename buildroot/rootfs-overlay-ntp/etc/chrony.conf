# === Reference clocks from gpsd (SysV SHM) ===
# SHM0: NMEA fix time from ttyS2 — coarse (~0.2s delay, jittery), monitoring only
refclock SHM 0 refid NMEA precision 1e-1 offset 0.200 noselect
# SHM2: PPS (DMTimer hardware capture) paired with fix time by gpsd — primary
refclock SHM 2 refid PPS precision 1e-7 prefer

# Upstream NTP pool (testing / sanity cross-check)
pool pool.ntp.org iburst maxsources 4

# Local clock fallback (stratum 10) if all sources unreachable
local stratum 10

# Allow NTP queries from local nets
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

driftfile /var/lib/chrony/drift

# Step clock at boot if offset > 1.0 sec (first 3 updates)
makestep 1.0 3

# Sync RTC to system clock
rtcsync
