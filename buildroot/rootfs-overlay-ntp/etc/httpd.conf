# Ramliya - busybox httpd configuration (read-only status UI)
#
# Requires busybox built with:
#   CONFIG_HTTPD=y
#   CONFIG_FEATURE_HTTPD_CGI=y
#   CONFIG_FEATURE_HTTPD_CONFIG_WITH_SCRIPT_INTERPR=y
#
# Doc-root and port are passed on the command line by the Finit unit
# (httpd -f -p 8080 -h /var/www -c /etc/httpd.conf), not here.

# Run every *.cgi through /bin/sh explicitly. This makes CGI execution
# independent of the file's shebang and exec bit, and keeps it pinned to
# the busybox/mksh-safe POSIX shell rather than guessing an interpreter.
*.cgi:/bin/sh
