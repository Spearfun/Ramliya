# Dropbear SSH daemon (soft mode: independent of persistent mount).
# mount-persistent runs in [S] before runlevel 2, so /etc/dropbear is
# normally already bind-mounted to NAND when dropbear starts. If the mount
# task fails, dropbear still starts with a volatile RAM key — SSH stays up.
service <!> [2345] /usr/sbin/dropbear -F -E -R -- Dropbear SSH daemon
