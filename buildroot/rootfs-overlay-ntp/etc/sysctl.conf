# ── L3+ NTP/PTP appliance sysctl ──

# swap: у appliance swap отключён (mlockall прибивает страницы),
# значение косметическое, ставим 0 для честности
vm.swappiness = 0

# целостность данных на NAND/UBIFS при внезапном отключении питания:
# чаще сбрасываем dirty-страницы → меньше потерь, меньше UBIFS recovery
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 1000
vm.dirty_writeback_centisecs = 250

# hardening
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# kernel.sched_rt_runtime_us = 950000

